<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Masuk - BundaCare</title>
  <style>#sidebar{display:none!important;}#bottom-nav{display:none!important;}body{opacity:0;animation:pgIn .3s ease .05s forwards;}@keyframes pgIn{to{opacity:1;}}</style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../style.css"/>
</head>
<body style="min-height:100vh;background:linear-gradient(135deg,#fafafa 0%,#f5f0ff 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">

  <a href="../index.html" style="display:flex;align-items:center;gap:8px;margin-bottom:28px;text-decoration:none;">
    <div style="width:36px;height:36px;background:linear-gradient(135deg,#f472b6,#ec4899);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;"><i class="fas fa-heart"></i></div>
    <span style="font-family:'Inter',sans-serif;font-size:20px;font-weight:700;color:#ec4899;">BundaCare</span>
  </a>

  <div class="auth-card">
    <h1 style="font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:#111827;margin-bottom:4px;">Masuk ke Akun Anda</h1>
    <p style="font-size:13px;color:#9ca3af;margin-bottom:28px;">Selamat datang kembali di BundaCare</p>

    <div style="margin-bottom:16px;">
      <label class="flabel">Email</label>
      <div class="inp-wrap">
        <i class="fas fa-envelope inp-icon"></i>
        <input class="inp" type="email" placeholder="contoh@email.com"/>
      </div>
    </div>

    <div style="margin-bottom:8px;">
      <label class="flabel">Password</label>
      <div class="inp-wrap">
        <i class="fas fa-lock inp-icon"></i>
        <input class="inp" type="password" id="pw-login" placeholder="Masukkan password Anda"/>
        <i class="fas fa-eye inp-icon-right" onclick="showPwToggle('pw-login',this)"></i>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#6b7280;cursor:pointer;">
        <input type="checkbox" style="accent-color:#ec4899;width:15px;height:15px;"/> Ingat Saya
      </label>
      <a href="forgot-password.html" style="font-size:13px;color:#ec4899;font-weight:600;">Lupa Password?</a>
    </div>

    <a href="../user/dashboard.html" class="btn btn-pink btn-full" style="margin-bottom:20px;font-size:15px;padding:13px;">Masuk</a>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <div style="flex:1;height:1px;background:#f3f4f6;"></div>
      <span style="font-size:12px;color:#9ca3af;font-weight:600;">atau</span>
      <div style="flex:1;height:1px;background:#f3f4f6;"></div>
    </div>

    <p style="text-align:center;font-size:13px;color:#6b7280;">
      Belum punya akun? <a href="register.html" style="color:#ec4899;font-weight:700;">Daftar Sekarang</a>
    </p>
  </div>

  <a href="../index.html" style="margin-top:20px;font-size:13px;color:#9ca3af;display:flex;align-items:center;gap:6px;">
    <i class="fas fa-arrow-left"></i> Kembali ke Beranda
  </a>

  <div id="toast"><i class="fas fa-check-circle"></i><span></span></div>
  <script src="../app.js"></script>
</body>
</html>

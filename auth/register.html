<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Daftar - BundaCare</title>
  <style>#sidebar{display:none!important;}#bottom-nav{display:none!important;}body{opacity:0;animation:pgIn .3s ease .05s forwards;}@keyframes pgIn{to{opacity:1;}}</style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../style.css"/>
</head>
<body style="min-height:100vh;background:linear-gradient(135deg,#fafafa 0%,#f5f0ff 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">

  <a href="../index.html" style="display:flex;align-items:center;gap:8px;margin-bottom:28px;text-decoration:none;">
    <div style="width:36px;height:36px;background:linear-gradient(135deg,#f472b6,#ec4899);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;"><i class="fas fa-heart"></i></div>
    <span style="font-family:'Inter',sans-serif;font-size:20px;font-weight:700;color:#ec4899;">BundaCare</span>
  </a>

  <div class="auth-card">
    <h1 style="font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:#111827;margin-bottom:4px;">Buat Akun Baru</h1>
    <p style="font-size:13px;color:#9ca3af;margin-bottom:24px;">Bergabung dan mulai pantau kehamilan Anda</p>

    <div style="margin-bottom:14px;">
      <label class="flabel">Nama Lengkap</label>
      <div class="inp-wrap">
        <i class="fas fa-user inp-icon"></i>
        <input class="inp" type="text" placeholder="Nama lengkap Anda"/>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <label class="flabel">Email</label>
      <div class="inp-wrap">
        <i class="fas fa-envelope inp-icon"></i>
        <input class="inp" type="email" placeholder="contoh@email.com"/>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <label class="flabel">Nomor HP</label>
      <div class="inp-wrap">
        <i class="fas fa-phone inp-icon"></i>
        <input class="inp" type="tel" placeholder="08xxxxxxxxxx"/>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <label class="flabel">Password</label>
      <div class="inp-wrap">
        <i class="fas fa-lock inp-icon"></i>
        <input class="inp" type="password" id="pw-reg" placeholder="Minimal 8 karakter"/>
        <i class="fas fa-eye inp-icon-right" onclick="showPwToggle('pw-reg',this)"></i>
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <label class="flabel">Konfirmasi Password</label>
      <div class="inp-wrap">
        <i class="fas fa-lock inp-icon"></i>
        <input class="inp" type="password" id="pw-conf" placeholder="Ulangi password Anda"/>
        <i class="fas fa-eye inp-icon-right" onclick="showPwToggle('pw-conf',this)"></i>
      </div>
    </div>

    <label style="display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#6b7280;cursor:pointer;margin-bottom:24px;">
      <input type="checkbox" style="accent-color:#ec4899;width:16px;height:16px;margin-top:2px;flex-shrink:0;"/>
      <span>Saya menyetujui <a href="#" style="color:#ec4899;font-weight:600;">Syarat dan Ketentuan</a> serta <a href="#" style="color:#ec4899;font-weight:600;">Kebijakan Privasi</a> BundaCare</span>
    </label>

    <a href="hpht.html" class="btn btn-pink btn-full" style="margin-bottom:20px;font-size:15px;padding:13px;">Daftar Sekarang</a>

    <p style="text-align:center;font-size:13px;color:#6b7280;">
      Sudah punya akun? <a href="login.html" style="color:#ec4899;font-weight:700;">Masuk</a>
    </p>
  </div>

  <a href="../index.html" style="margin-top:20px;font-size:13px;color:#9ca3af;display:flex;align-items:center;gap:6px;">
    <i class="fas fa-arrow-left"></i> Kembali ke Beranda
  </a>

  <div id="toast"><i class="fas fa-check-circle"></i><span></span></div>
  <script src="../app.js"></script>
</body>
</html>
